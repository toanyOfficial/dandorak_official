<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>단도락 메뉴보기</title>
    <meta name="description" content="단도락 메뉴를 카테고리와 가격 조건으로 조회하는 페이지입니다." />
    <link rel="icon" type="image/webp" href="./assets/images/landing/favicon.webp" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="menu-page">
    <header class="menu-topbar">
      <a class="brand" href="/" aria-label="단도락 첫 화면으로 이동">
        <span class="brand-mark" aria-hidden="true"><img src="./assets/images/landing/favicon.webp" alt="" /></span>
        <span>단도락 메뉴보기</span>
      </a>
      <a class="btn btn-secondary menu-home-link" href="/">홈으로</a>
    </header>

    <main class="menu-shell">
      <details class="menu-operation-bar" aria-label="메뉴 조회 조건">
        <summary class="menu-operation-summary">조회조건 설정하기 <span aria-hidden="true">▼</span></summary>
        <div class="menu-filter-group">
          <div>
            <p class="eyebrow">카테고리 필터</p>
            <div id="menu-category-filters" class="menu-checkbox-grid" aria-live="polite"></div>
          </div>
          <div class="menu-price-panel">
            <p class="eyebrow">가격 필터</p>
            <div class="price-range-control" aria-label="가격 범위 선택">
              <div class="price-range-track" aria-hidden="true"></div>
              <input id="menu-min-price" class="price-range-input" type="range" min="9000" max="100000" step="1000" value="9000" aria-label="최소 가격" />
              <input id="menu-max-price" class="price-range-input" type="range" min="9000" max="100000" step="1000" value="50000" aria-label="최대 가격" />
            </div>
            <div class="price-range-values">
              <label>최소 <input id="menu-min-price-number" type="number" min="9000" max="100000" step="1000" value="9000" inputmode="numeric" /></label>
              <label>최대 <input id="menu-max-price-number" type="number" min="9000" max="100000" step="1000" value="50000" inputmode="numeric" /></label>
            </div>
          </div>
        </div>
        <fieldset class="menu-sort-group">
          <legend class="eyebrow">정렬</legend>
          <label><input type="radio" name="menu-sort" value="category" checked /> 카테고리순</label>
          <div class="menu-sort-price-options" role="group" aria-label="가격순 정렬">
            <span>가격순</span>
            <label><input type="radio" name="menu-sort" value="price_desc" /> 내림차순</label>
            <label><input type="radio" name="menu-sort" value="price_asc" /> 오름차순</label>
          </div>
        </fieldset>
      </details>

      <section class="menu-results-section" aria-label="조회된 메뉴">
        <div id="menu-results" class="menu-category-stack" aria-live="polite"></div>
      </section>
    </main>

    <footer class="site-footer" aria-label="단도락 사업자 정보">
      <div class="site-footer-inner">
        <div class="site-footer-brand">
          <span class="site-footer-kicker">DANDORAK OFFICIAL</span>
          <strong>단체도시락 단도락</strong>
          <p>정성스럽게 만든 단체도시락을 믿을 수 있는 납품 시스템으로 전합니다.</p>
        </div>
        <dl class="site-footer-info">
          <div><dt>사업자등록번호</dt><dd>412-55-00601</dd></div>
          <div><dt>상호명</dt><dd>단체도시락 단도락</dd></div>
          <div><dt>대표자</dt><dd>마진형</dd></div>
          <div><dt>소재지</dt><dd>서울 강남구 역삼동 828-28</dd></div>
          <div><dt>업태/업종</dt><dd>제조업/도시락류 제조업</dd></div>
          <div><dt>영업신고번호</dt><dd>제 2017-0107690 호</dd></div>
        </dl>
      </div>
    </footer>

    <nav id="menu-floating-nav" class="menu-floating-nav" aria-label="메뉴 빠른 이동"></nav>

    <div id="menu-image-modal" class="menu-image-modal" role="dialog" aria-modal="true" aria-labelledby="menu-image-modal-title" aria-hidden="true">
      <div class="menu-image-modal-backdrop" data-menu-modal-close></div>
      <div class="menu-image-modal-dialog" role="document">
        <button class="menu-image-modal-close" type="button" data-menu-modal-close aria-label="큰 이미지 닫기">×</button>
        <figure class="menu-image-modal-content">
          <img id="menu-image-modal-img" src="" alt="" decoding="async" />
          <figcaption>
            <p class="menu-image-modal-name-line">
              <strong id="menu-image-modal-title"></strong>
              <span id="menu-image-modal-long-name"></span>
            </p>
            <small id="menu-image-modal-main-dish"></small>
          </figcaption>
        </figure>
      </div>
    </div>

    <script src="menu.js"></script>
  </body>
</html>
